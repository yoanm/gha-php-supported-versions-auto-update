name: 'CI'

on: # Build any PRs and main branch changes
  workflow_dispatch: # Allows to run the workflow manually from the Actions tab
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: "Checkout yoanm/php-versions"
        uses: actions/checkout@v6
        with:
          repository: 'yoanm/php-versions'
          path: 'tmp-php-versions-repo'

      - name: Fetch original versions for "Basic test"
        id: fetch-original-versions
        uses: yoanm/gha-supported-versions-parser@v1
        with:
          path: tests/data/basic-test.json
          dependency: php

      - name: Basic test
        id: basic-test
        uses: ./
        with:
          path: tests/data/basic-test.json

      - name: Fetch updated versions for "Basic test"
        id: fetch-updated-versions
        uses: yoanm/gha-supported-versions-parser@v1
        with:
          path: tests/data/basic-test.json
          dependency: php

      - name: Validate "Basic test"
        shell: bash
        working-directory: 'tmp-php-versions-repo'
        env:
          ACTUAL_MIN: "${{ steps.fetch-updated-versions.outputs.min }}"
          EXPECTED_MIN: "${{ steps.fetch-original-versions.outputs.min }}"
          ACTUAL_MAX: "${{ steps.fetch-updated-versions.outputs.max }}"
          ACTUAL_NEXT: "${{ steps.fetch-updated-versions.outputs.next }}"
        run: |
          if [[ "$ACTUAL_MIN" != "$EXPECTED_MIN" ]]; then
            echo "::error::Invalid min version: expected '$EXPECTED_MIN', got '$ACTUAL_MIN' !"
            exit 1
          fi
          
          EXPECTED_MAX=$(bin/fetch_latest_supported_version.sh)
          EXPECTED_NEXT=$(bin/fetch_nightly_version.sh)
          if [[ "$ACTUAL_MAX" != "$EXPECTED_MAX" ]]; then
            echo "::error::Invalid max version: expected '$EXPECTED_MAX', got '$ACTUAL_MAX' !"
            exit 1
          elif [[ "$ACTUAL_NEXT" != "$EXPECTED_NEXT" ]]; then
            echo "::error::Invalid next version: expected '$EXPECTED_NEXT', got '$ACTUAL_NEXT' !"
            exit 1
          fi
